<!DOCTYPE html>
<html>
<head>
  <title>🔥 Pro Random Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      overflow: hidden;
    }

    .video-container {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #myVideo {
      width: 180px;
      height: 130px;
      bottom: 20px;
      right: 20px;
      border-radius: 15px;
      border: 2px solid white;
    }

    .top-bar {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      color: #38bdf8;
    }

    .controls {
      position: absolute;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 14px;
    }

    .start { background: #22c55e; }
    .next { background: #ef4444; }
    .mute { background: #eab308; }
    .end { background: #dc2626; }

    .chat-box {
      position: absolute;
      right: 20px;
      top: 80px;
      width: 250px;
      height: 300px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      font-size: 13px;
    }

    input {
      padding: 8px;
      border-radius: 8px;
      border: none;
      margin-top: 5px;
    }

    .you { color: #4ade80; }
    .stranger { color: #f87171; }
  </style>
</head>

<body>

<div class="video-container">

  <video id="userVideo" autoplay playsinline></video>
  <video id="myVideo" autoplay muted playsinline></video>

  <div class="top-bar" id="status">Idle</div>

  <div class="chat-box">
    <div id="chat"></div>
    <input id="msg" placeholder="Type..." onkeydown="if(event.key==='Enter') sendMsg()" />
  </div>

  <div class="controls">
    <button class="start" onclick="start()">Start</button>
    <button class="next" onclick="nextUser()">Next</button>
    <button class="mute" onclick="toggleMute()">Mute</button>
    <button class="end" onclick="endCall()">End</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let localStream;
let peerConnection;
let isMuted = false;

const config = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

async function startVideo() {
  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  document.getElementById("myVideo").srcObject = localStream;
}

function start() {
  socket.emit("start");
  status("Searching...");
}

function nextUser() {
  socket.emit("next");
  status("Finding new user...");
}

function endCall() {
  location.reload();
}

function toggleMute() {
  if (!localStream) return;
  isMuted = !isMuted;
  localStream.getAudioTracks()[0].enabled = !isMuted;
}

function sendMsg() {
  const msg = document.getElementById("msg").value;
  if (!msg) return;
  socket.emit("message", msg);
  addMsg("You", msg);
  document.getElementById("msg").value = "";
}

function addMsg(sender, text) {
  const div = document.createElement("div");
  div.className = sender === "You" ? "you" : "stranger";
  div.innerText = sender + ": " + text;
  document.getElementById("chat").appendChild(div);
}

function status(txt){
  document.getElementById("status").innerText = txt;
}

// SOCKET LOGIC SAME AS BEFORE 👇

socket.on("matched", async (data) => {
  status("Connected ✅");
  await startVideo();

  peerConnection = new RTCPeerConnection(config);

  localStream.getTracks().forEach(track => {
    peerConnection.addTrack(track, localStream);
  });

  peerConnection.ontrack = (e) => {
    document.getElementById("userVideo").srcObject = e.streams[0];
  };

  peerConnection.onicecandidate = (e) => {
    if (e.candidate) socket.emit("ice-candidate", e.candidate);
  };

  if (data.role === "caller") {
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    socket.emit("offer", offer);
  }
});

socket.on("offer", async (offer) => {
  await startVideo();

  peerConnection = new RTCPeerConnection(config);

  localStream.getTracks().forEach(track => {
    peerConnection.addTrack(track, localStream);
  });

  peerConnection.ontrack = (e) => {
    document.getElementById("userVideo").srcObject = e.streams[0];
  };

  peerConnection.onicecandidate = (e) => {
    if (e.candidate) socket.emit("ice-candidate", e.candidate);
  };

  await peerConnection.setRemoteDescription(offer);
  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);
  socket.emit("answer", answer);
});

socket.on("answer", async (answer) => {
  await peerConnection.setRemoteDescription(answer);
});

socket.on("ice-candidate", (c) => {
  peerConnection.addIceCandidate(new RTCIceCandidate(c));
});

socket.on("message", (msg) => addMsg("Stranger", msg));

socket.on("partner-left", () => status("User left 😢"));
</script>

</body>
</html>
